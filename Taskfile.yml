version: '3'

set: [pipefail]

dotenv: ['.env', '.env.local']

vars:
  SERVER_DIR: server
  EMITTER_DIR: tools/fake-emitter
  DEVICE_DIR: device/scripts
  UDP_PORT: '{{.UDP_PORT | default "7000"}}'
  WS_PORT: '{{.WS_PORT | default "3000"}}'

tasks:

  # ── Default ──────────────────────────────────────────────────────────────────

  default:
    desc: List available tasks
    cmds:
      - task --list

  # ── Clean ────────────────────────────────────────────────────────────────────

  clean:
    desc: Remove all build artifacts
    cmds:
      - rm -f penumbra-server penumbra-server-* ableton-dmx-server ableton-dmx-server-*
      - rm -rf tmp/
    dir: '{{.SERVER_DIR}}'

  clean:all:
    desc: Remove all build artifacts, node_modules, and caches
    deps: [clean]
    cmds:
      - rm -rf node_modules ui/node_modules electron/node_modules device/scripts/node_modules packages/*/node_modules
      - rm -rf ui/dist electron/dist device/scripts/dist server/ui/dist
      - rm -rf .task/
      - rm -f tools/fake-emitter/fake-emitter

  # ── Dev Session ──────────────────────────────────────────────────────────────

  dev:
    desc: Start tmux dev session (Go server + Vite UI + fake emitter)
    cmds:
      - tmux kill-session -t penumbra 2>/dev/null || true
      - tmux new-session  -d -s penumbra -n server
      - tmux send-keys    -t penumbra:server  'task --watch server:dev' Enter
      - tmux new-window   -t penumbra -n ui
      - tmux send-keys    -t penumbra:ui      'task watch:ui'   Enter
      - tmux new-window   -t penumbra -n emitter
      - tmux send-keys    -t penumbra:emitter 'task fake'       Enter
      - tmux select-window -t penumbra:server
      - tmux attach       -t penumbra

  # ── Install ──────────────────────────────────────────────────────────────────

  install:
    desc: Install all dependencies (pnpm + go mod)
    deps: [install:ts, install:go]

  install:ts:
    desc: Install TypeScript dependencies
    cmds:
      - pnpm install

  install:go:
    desc: Tidy Go modules
    cmds:
      - go mod tidy
    dir: '{{.SERVER_DIR}}'

  # ── Build ─────────────────────────────────────────────────────────────────────

  build:
    desc: Build all components (parallel)
    deps: [build:go, build:ts]

  gen:fixtures:
    desc: Generate server/fixtures/library.go from fixtures/*.json
    cmds:
      - go run ./tools/gen-fixtures/main.go
    sources:
      - 'fixtures/**/*.json'
    generates:
      - 'server/fixtures/library.go'

  build:go:
    desc: Build Go server and fake emitter
    deps: [build:ui, gen:fixtures]  # UI + fixtures must be generated first
    cmds:
      - go build -o penumbra-server .
      - cd ../{{.EMITTER_DIR}} && go build ./...
    dir: '{{.SERVER_DIR}}'
    sources:
      - '{{.SERVER_DIR}}/**/*.go'
      - 'ui/dist/**'
    generates:
      - '{{.SERVER_DIR}}/penumbra-server'

  build:ts:
    desc: Build all TypeScript packages
    cmds:
      - pnpm build

  build:ui:
    desc: Build Vite UI (output goes to server/ui/dist for embedding)
    cmds:
      - pnpm --filter ui build
    sources:
      - 'ui/src/**'
      - 'ui/public/**'
      - 'ui/vite.config.mts'
    generates:
      - 'server/ui/dist/**'

  build:device:
    desc: Build M4L device scripts
    cmds:
      - pnpm --filter device-scripts build
    dir: '{{.DEVICE_DIR}}'
    sources:
      - '{{.DEVICE_DIR}}/src/**/*.ts'
    generates:
      - '{{.DEVICE_DIR}}/dist/main.js'

  build:electron:
    desc: Build Electron shell
    cmds:
      - pnpm --filter electron build

  # ── Watch ─────────────────────────────────────────────────────────────────────

  watch:
    desc: Watch all components (parallel)
    deps: [watch:go, watch:device, watch:ui]

  watch:go:
    desc: Watch and rebuild Go server
    cmds:
      - task: server:dev
    watch: true

  watch:device:
    desc: Watch M4L device scripts (autowatch reloads in Max)
    cmds:
      - pnpm --filter device-scripts watch

  watch:ui:
    desc: Run Vite dev server (proxies /ws to Go)
    cmds:
      - pnpm --filter ui dev

  # ── Test ──────────────────────────────────────────────────────────────────────

  test:
    desc: Run all tests (parallel)
    deps: [test:go, test:ts]

  test:go:
    desc: Run Go tests
    cmds:
      - go test ./...
    dir: '{{.SERVER_DIR}}'

  test:ts:
    desc: Run TypeScript tests
    cmds:
      - pnpm test

  playwright:
    desc: Run Playwright browser tests (requires Go server on :3000)
    summary: |
      Starts the Vite dev server if not already running, then runs Playwright.
      Prerequisite: Go server must be running on port 3000.
        task server:dev   # in one terminal
        task fake         # in another terminal (or use M4L)
        task playwright   # in a third terminal
    cmds:
      - pnpm --filter ui playwright

  # ── Lint / Typecheck ──────────────────────────────────────────────────────────

  lint:
    desc: Lint all components (parallel)
    deps: [lint:go, lint:ts]

  lint:go:
    desc: Vet Go code
    cmds:
      - go vet ./...
    dir: '{{.SERVER_DIR}}'

  lint:ts:
    desc: Lint TypeScript
    cmds:
      - pnpm lint

  typecheck:
    desc: Typecheck all TypeScript
    cmds:
      - pnpm typecheck

  ci:
    desc: Run full CI suite locally (lint + typecheck + test + build)
    cmds:
      - task: lint
      - task: typecheck
      - task: test
      - task: build

  # ── Fake Emitter ──────────────────────────────────────────────────────────────

  fake:
    desc: Run fake emitter — MODE=static|animated|stress TARGET=host:port
    summary: |
      Replaces M4L for development. No Live license needed.
      Examples:
        task fake                               # animated (slow, realistic), localhost
        task fake MODE=static                   # fixed values
        task fake MODE=stress                   # fast sweeps for load testing
        task fake TARGET=192.168.1.50:7000      # remote server
        task fake MODE=animated SESSION=test-1  # custom session ID
    cmds:
      - go build -o fake-emitter .
      - ./fake-emitter --mode {{.MODE | default "animated"}} --target {{if .TARGET}}{{.TARGET}}{{else}}localhost:{{.UDP_PORT}}{{end}}{{if .SESSION}} --session {{.SESSION}}{{end}}
    dir: '{{.EMITTER_DIR}}'

  fake:static:
    desc: Run fake emitter in static mode (fixed values)
    cmds:
      - task: fake
        vars: { MODE: static }

  fake:animated:
    desc: Run fake emitter in animated mode (slow, realistic shifts)
    cmds:
      - task: fake
        vars: { MODE: animated }

  fake:stress:
    desc: Run fake emitter in stress mode (fast sweeps for load testing)
    cmds:
      - task: fake
        vars: { MODE: stress }

  # ── Server ────────────────────────────────────────────────────────────────────

  server:
    desc: Run Go server (requires built binary)
    cmds:
      - ./penumbra-server
    dir: '{{.SERVER_DIR}}'
    env:
      UDP_PORT: '{{.UDP_PORT}}'
      WS_PORT: '{{.WS_PORT}}'

  server:tui:
    desc: Run Go server with TUI dashboard
    cmds:
      - go build -o penumbra-server .
      - ./penumbra-server --tui
    dir: '{{.SERVER_DIR}}'
    env:
      UDP_PORT: '{{.UDP_PORT}}'
      WS_PORT: '{{.WS_PORT}}'

  server:dev:
    desc: Run Go server in dev mode with live reload
    cmds:
      - go build -o penumbra-server .
      - ./penumbra-server
    dir: '{{.SERVER_DIR}}'
    env:
      UDP_PORT: '{{.UDP_PORT}}'
      WS_PORT: '{{.WS_PORT}}'
    sources:
      - '**/*.go'

  # ── M4L Device ────────────────────────────────────────────────────────────────

  pack:
    desc: Build everything and pack .amxd for distribution
    deps: [build:device]
    cmds:
      - scripts/pack.sh

  unpack:
    desc: Unpack .amxd into device/ for development
    cmds:
      - scripts/unpack.sh

  # ── Release ───────────────────────────────────────────────────────────────────

  release:build:
    desc: Build release artifacts (all platforms)
    deps: [build:ui]
    cmds:
      - GOOS=darwin  GOARCH=arm64 go build -o penumbra-server-mac-arm64     .
      - GOOS=darwin  GOARCH=amd64 go build -o penumbra-server-mac-amd64     .
      - GOOS=linux   GOARCH=arm64 go build -o penumbra-server-linux-arm64   .
      - GOOS=linux   GOARCH=amd64 go build -o penumbra-server-linux-amd64   .
      - GOOS=windows GOARCH=arm64 go build -o penumbra-server-windows-arm64.exe .
      - GOOS=windows GOARCH=amd64 go build -o penumbra-server-windows-amd64.exe .
    dir: '{{.SERVER_DIR}}'

  release:electron:
    desc: Package Electron app
    cmds:
      - pnpm --filter electron package
